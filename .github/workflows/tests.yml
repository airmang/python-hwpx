name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e .[test,typecheck]

      - name: Check public repository hygiene
        run: python scripts/check_public_hygiene.py

      - name: Run Ruff gates
        run: |
          ruff check --select E9,F .
          ruff check --select E4,E7,E9,F \
            src/hwpx/document.py \
            src/hwpx/agent/{commands,document,story}.py \
            src/hwpx/oxml/{_document_impl,_document_primitives,document,document_parts,header_part,memo,numbering,objects,paragraph,run,section,section_format,section_story,simple_parts,table}.py \
            src/hwpx/tools/package_validator.py \
            tests/template_automation/generate_fixtures.py \
            tests/{test_agent_story_commands,test_oxml_modularization,test_paragraph_section_management,test_section_headers}.py

      - name: Validate gradual typing migration scope
        run: python scripts/check_typing_generics_scope.py

      - name: Run mypy (gradual scope)
        run: mypy

      - name: Run pyright (gradual scope)
        run: pyright

      - name: Run tests and keep summary log
        env:
          # 2026-07 실측 86%에서 출발하는 회귀 방지 래칫.
          COVERAGE_FAIL_UNDER: 80
        run: |
          pytest -v -ra --cov=hwpx --cov-report=term-missing --cov-fail-under=${COVERAGE_FAIL_UNDER} 2>&1 | tee pytest-summary.log

      - name: Conformance — structural badge tiers vs golden (plan §2 Phase G)
        run: |
          # No Hancom in CI: the structural tiers (Open / Semantic / Form) gate
          # here and VisualComplete is reported unverified (§0.0). A dropped pass
          # rate against the committed golden fails the job — regression as a
          # number, not a vibe. The oracle tier runs on a Hancom-reachable box.
          hwpx-conformance run --tier structural \
            --check tests/conformance/golden/structural.json \
            --out conformance-report 2>/dev/null

      - name: Upload conformance report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: conformance-report-${{ matrix.python-version }}
          path: conformance-report

      - name: Upload pytest summary log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pytest-summary-${{ matrix.python-version }}
          path: pytest-summary.log
