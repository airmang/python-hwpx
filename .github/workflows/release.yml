name: Release

on:
  push:
    tags:
      - "v*"
      - "[0-9]*"

permissions:
  contents: write
  id-token: write

jobs:
  prepublish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Install release test dependencies
        run: python -m pip install -e ".[test,typecheck]"
      - name: Check public repository hygiene
        run: python scripts/check_public_hygiene.py
      - name: Run first-stage Ruff gate
        run: ruff check --select E9,F .
      - name: Run typing checks
        run: |
          python scripts/check_typing_generics_scope.py
          mypy
          pyright
      - name: Run tests with coverage ratchet
        run: pytest -q --cov=hwpx --cov-report=term-missing --cov-fail-under=80
      - name: Run structural conformance gate
        run: hwpx-conformance run --tier structural --check tests/conformance/golden/structural.json --out conformance-report

  release:
    needs: prepublish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Validate tag/version consistency
        shell: bash
        run: |
          set -euo pipefail

          TAG_NAME="${GITHUB_REF_NAME}"
          TAG_VERSION="${TAG_NAME#v}"

          PYPROJECT_VERSION=$(python - <<'PY'
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          print(data["project"]["version"])
          PY
          )

          CHANGELOG_VERSION=$(python - <<'PY'
          import re
          from pathlib import Path

          changelog = Path("CHANGELOG.md").read_text(encoding="utf-8")
          # Skip the conventional [Unreleased] heading so keep-a-changelog
          # workflow (pre-collecting notes above the released version) is
          # preserved alongside tag-based release automation.
          matches = re.findall(r"^## \[([^\]]+)\]", changelog, re.MULTILINE)
          version = next(
              (m.strip() for m in matches if m.strip().lower() != "unreleased"),
              None,
          )
          if version is None:
              raise SystemExit("CHANGELOG.md에서 버전 섹션(## [x.y.z])을 찾지 못했습니다.")
          print(version)
          PY
          )

          echo "Tag version: ${TAG_VERSION}"
          echo "pyproject version: ${PYPROJECT_VERSION}"
          echo "changelog version: ${CHANGELOG_VERSION}"

          if [[ "${TAG_VERSION}" != "${PYPROJECT_VERSION}" ]]; then
            echo "태그 버전(${TAG_VERSION})과 pyproject 버전(${PYPROJECT_VERSION})이 일치하지 않습니다." >&2
            exit 1
          fi

          if [[ "${TAG_VERSION}" != "${CHANGELOG_VERSION}" ]]; then
            echo "태그 버전(${TAG_VERSION})과 changelog 최신 버전(${CHANGELOG_VERSION})이 일치하지 않습니다." >&2
            exit 1
          fi

      - name: Extract latest changelog section for release notes
        run: |
          python - <<'PY'
          from pathlib import Path

          lines = Path("CHANGELOG.md").read_text(encoding="utf-8").splitlines()
          # Find the first released version heading, skipping [Unreleased].
          start = next(
              (
                  i
                  for i, line in enumerate(lines)
                  if line.startswith("## [") and "unreleased" not in line.lower()
              ),
              None,
          )
          if start is None:
              raise SystemExit("CHANGELOG.md에서 릴리스 섹션을 찾지 못했습니다.")

          end = next(
              (i for i in range(start + 1, len(lines)) if lines[i].startswith("## [")),
              len(lines),
          )

          section = "\n".join(lines[start:end]).strip() + "\n"
          Path("release_notes.md").write_text(section, encoding="utf-8")
          PY

      - name: Build distributions (migrated from scripts/build-and-publish.sh)
        run: |
          python -m pip install --upgrade build twine
          rm -rf dist build
          python -m build
          twine check dist/*
          python scripts/check_public_hygiene.py

      - name: Generate release SBOM
        run: |
          python -m venv .sbom-runtime
          .sbom-runtime/bin/python -m pip install dist/*.whl
          python -m venv .sbom-tool
          .sbom-tool/bin/python -m pip install "cyclonedx-bom==7.3.0"
          mkdir -p release-artifacts
          .sbom-tool/bin/cyclonedx-py environment .sbom-runtime/bin/python \
            --pyproject pyproject.toml \
            --mc-type library \
            --output-reproducible \
            --output-format JSON \
            --output-file "release-artifacts/python-hwpx-${GITHUB_REF_NAME}.cdx.json"

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@c12583777ecdfd3be55c69cf75464299dc01057e # v3
        with:
          body_path: release_notes.md
          files: |
            dist/*
            release-artifacts/*
