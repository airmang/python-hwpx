name: 기능 제안
description: 새로운 기능이나 개선 아이디어를 제안합니다.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 해결하려는 문제
      description: 어떤 불편함이나 한계를 겪고 있나요? 지금은 어떻게 우회하고 있나요?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 제안하는 방법
      description: 어떤 식으로 동작하면 좋을지 적어주세요. API 형태나 사용 예시가 있으면 도움이 됩니다.
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: 대안·맥락
      description: 고려했던 다른 방법이나 참고할 만한 배경 정보가 있다면 적어주세요.
    validations:
      required: false
